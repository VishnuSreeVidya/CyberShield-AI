  <g transform="translate(510, 200)">
    <rect width="140" height="72" rx="8" fill="rgba(255,68,68,0.06)" stroke="rgba(255,68,68,0.25)" stroke-width="0.8"/>
    <text x="70" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ff4444" text-anchor="middle">ENGINE</text>
    <text x="70" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">Detection</text>
    <text x="70" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">7 Log Rules</text>
    <text x="70" y="62" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">+ 5 Analysis Engines</text>
  </g>

