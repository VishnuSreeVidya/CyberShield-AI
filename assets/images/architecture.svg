<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="135%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(34,38,74,0.55)"/>
      <stop offset="100%" style="stop-color:rgba(24,30,58,0.35)"/>
    </linearGradient>
    <filter id="boxGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="600" fill="url(#archBg)"/>

  <text x="600" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600" fill="white" text-anchor="middle">System Architecture</text>
  <text x="600" y="53" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">v2.0 - Multi-Source Cyber Threat Intelligence Platform</text>
  <rect x="425" y="60" width="350" height="2" fill="url(#lineGrad)" rx="1"/>

  <!-- User Layer -->
  <g transform="translate(40, 80)">
    <rect width="150" height="65" rx="10" fill="rgba(0,170,255,0.08)" stroke="rgba(0,170,255,0.3)" stroke-width="1" filter="url(#boxGlow)"/>
    <text x="75" y="22" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#00aaff" text-anchor="middle">USER LAYER</text>
    <text x="75" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">Browser</text>
    <text x="75" y="55" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">HTML/CSS/JS</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(190, 100)" opacity="0.6">
    <line x1="0" y1="12" x2="50" y2="12" stroke="#00ff88" stroke-width="1.5"/>
    <polygon points="50,6 62,12 50,18" fill="#00ff88"/>
    <text x="30" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">HTTP</text>
  </g>

  <!-- Flask App -->
  <g transform="translate(260, 72)">
    <rect width="200" height="82" rx="10" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.3)" stroke-width="1" filter="url(#boxGlow)"/>
    <text x="100" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#00ff88" text-anchor="middle">FLASK APP</text>
    <text x="100" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">Python 3.13</text>
    <text x="100" y="54" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Flask + SQLAlchemy</text>
    <text x="100" y="68" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Flask-Login + WTF</text>
  </g>

  <!-- Arrows to blueprints -->
  <g opacity="0.4">
    <line x1="310" y1="154" x2="100" y2="195" stroke="#00ff88" stroke-width="1" stroke-dasharray="4"/>
    <line x1="340" y1="154" x2="260" y2="195" stroke="#00ff88" stroke-width="1" stroke-dasharray="4"/>
    <line x1="370" y1="154" x2="420" y2="195" stroke="#00ff88" stroke-width="1" stroke-dasharray="4"/>
    <line x1="400" y1="154" x2="580" y2="195" stroke="#00ff88" stroke-width="1" stroke-dasharray="4"/>
    <line x1="430" y1="154" x2="740" y2="195" stroke="#00ff88" stroke-width="1" stroke-dasharray="4"/>
