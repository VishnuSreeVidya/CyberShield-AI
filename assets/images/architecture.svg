      <text x="60" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">pdf_detector</text>
      <text x="60" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Malicious PDF</text>
