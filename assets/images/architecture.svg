    <g transform="translate(405, 12)">
      <rect width="120" height="50" rx="6" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.2)" stroke-width="0.5"/>
      <text x="60" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#22c55e" text-anchor="middle">ip_detector</text>
      <text x="60" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Reputation/Geo</text>
    </g>

    <g transform="translate(540, 12)">
      <rect width="120" height="50" rx="6" fill="rgba(170,0,255,0.06)" stroke="rgba(170,0,255,0.2)" stroke-width="0.5"/>
      <text x="60" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#aa00ff" text-anchor="middle">hash_detector</text>
      <text x="60" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">VT/Malware DB</text>
    </g>
  </g>

  <!-- Arrows down to data layer -->
  <g opacity="0.4">
    <line x1="100" y1="272" x2="200" y2="430" stroke="#ffaa00" stroke-width="1" stroke-dasharray="4"/>
    <line x1="260" y1="272" x2="300" y2="430" stroke="#00ff88" stroke-width="1" stroke-dasharray="4"/>
    <line x1="420" y1="380" x2="400" y2="430" stroke="#3b9eff" stroke-width="1" stroke-dasharray="4"/>
    <line x1="580" y1="272" x2="500" y2="430" stroke="#ff4444" stroke-width="1" stroke-dasharray="4"/>
    <line x1="740" y1="272" x2="600" y2="430" stroke="#aa00ff" stroke-width="1" stroke-dasharray="4"/>
  </g>

  <!-- Database Layer -->
  <g transform="translate(120, 440)">
