    <text x="70" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#aa00ff" text-anchor="middle">BLUEPRINT</text>
    <text x="70" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">Logs</text>
    <text x="70" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Upload + Parse</text>
    <text x="70" y="62" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">5 Format Parsers</text>
