    <text x="70" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffaa00" text-anchor="middle">BLUEPRINT</text>
    <text x="70" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">Auth</text>
    <text x="70" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Login / Register</text>
    <text x="70" y="62" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Password Hashing</text>
  </g>

  <!-- Blueprint: Dashboard -->
  <g transform="translate(190, 200)">
    <rect width="140" height="72" rx="8" fill="rgba(0,255,136,0.06)" stroke="rgba(0,255,136,0.25)" stroke-width="0.8"/>
    <text x="70" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#00ff88" text-anchor="middle">BLUEPRINT</text>
    <text x="70" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">Dashboard</text>
    <text x="70" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">SOC Overview</text>
    <text x="70" y="62" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Charts + Reports</text>
  </g>

  <!-- Blueprint: Analysis (NEW) -->
  <g transform="translate(350, 200)">
    <rect width="140" height="72" rx="8" fill="rgba(59,158,255,0.06)" stroke="rgba(59,158,255,0.25)" stroke-width="0.8"/>
    <text x="70" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#3b9eff" text-anchor="middle">BLUEPRINT</text>
    <text x="70" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">Analysis</text>
    <text x="70" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">URL / Text / PDF</text>
    <text x="70" y="62" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">IP / Hash Modules</text>
  </g>

