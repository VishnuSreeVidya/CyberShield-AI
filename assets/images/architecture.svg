    <text x="110" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#00aaff" text-anchor="middle">DATA LAYER</text>
    <text x="110" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">PostgreSQL 18</text>
    <text x="110" y="54" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Users, Logs, Alerts, Reports</text>
    <text x="110" y="66" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">+ Analysis History Tables</text>
  </g>

  <!-- Export Layer -->
  <g transform="translate(370, 440)">
    <rect width="220" height="75" rx="10" fill="rgba(255,170,0,0.08)" stroke="rgba(255,170,0,0.3)" stroke-width="1"/>
    <text x="110" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ffaa00" text-anchor="middle">EXPORT LAYER</text>
    <text x="110" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">Reports</text>
    <text x="110" y="54" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">PDF + CSV + JSON</text>
    <text x="110" y="66" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Matplotlib Charts</text>
  </g>

