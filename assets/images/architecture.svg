  <g transform="translate(640, 80)">
    <rect width="520" height="180" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <text x="260" y="22" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">INFRASTRUCTURE</text>

    <g transform="translate(20, 38)">
      <rect width="230" height="50" rx="8" fill="rgba(0,170,255,0.06)" stroke="rgba(0,170,255,0.2)" stroke-width="0.5"/>
      <text x="115" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#00aaff" text-anchor="middle">Docker Compose</text>
      <text x="115" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Multi-Service Orchestration</text>
    </g>

    <g transform="translate(270, 38)">
      <rect width="230" height="50" rx="8" fill="rgba(0,255,136,0.06)" stroke="rgba(0,255,136,0.2)" stroke-width="0.5"/>
      <text x="115" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#00ff88" text-anchor="middle">Gunicorn</text>
      <text x="115" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">4 Workers, 120s Timeout</text>
    </g>

    <g transform="translate(20, 100)">
      <rect width="230" height="50" rx="8" fill="rgba(170,0,255,0.06)" stroke="rgba(170,0,255,0.2)" stroke-width="0.5"/>
      <text x="115" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#aa00ff" text-anchor="middle">Python 3.13-slim</text>
      <text x="115" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Optimized Image</text>
    </g>

    <g transform="translate(270, 100)">
      <rect width="230" height="50" rx="8" fill="rgba(255,170,0,0.06)" stroke="rgba(255,170,0,0.2)" stroke-width="0.5"/>
      <text x="115" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ffaa00" text-anchor="middle">Health Check</text>
      <text x="115" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">/health Endpoint</text>
    </g>
  </g>

  <!-- Bottom label -->
  <text x="600" y="588" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8892b0" text-anchor="middle" opacity="0.5">CyberShield AI v2.0 - Multi-Source Threat Intelligence with Flask Blueprints</text>
</svg>