      <text x="100" y="48" font-family="'JetBrains Mono', Consolas, monospace" font-size="10" fill="#ccd6f6">192.168.1.15</text>
      <text x="25" y="66" font-family="'JetBrains Mono', Consolas, monospace" font-size="10" fill="#8892b0">Attempts:  </text>
      <text x="100" y="66" font-family="'JetBrains Mono', Consolas, monospace" font-size="10" fill="#ff4444">5 Failed Logins (threshold: 5)</text>
    </g>

