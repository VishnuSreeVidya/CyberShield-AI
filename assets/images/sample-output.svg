      <text x="178" y="17" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#ffaa00" text-anchor="middle">HIGH</text>
      <text x="12" y="36" font-family="'JetBrains Mono', Consolas, monospace" font-size="9" fill="#8892b0">IP: 203.0.113.42 | GET /etc/passwd</text>
