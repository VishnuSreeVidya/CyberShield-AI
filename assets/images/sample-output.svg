      <text x="22" y="26" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ffaa00" text-anchor="middle">!</text>
      <text x="38" y="26" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#ffaa00">Directory Traversal</text>
      <rect x="210" y="12" width="40" height="20" rx="10" fill="rgba(255,170,0,0.15)"/>
      <text x="230" y="26" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffaa00" text-anchor="middle">HIGH</text>
      <text x="25" y="48" font-family="'JetBrains Mono', Consolas, monospace" font-size="10" fill="#8892b0">Source IP: </text>
      <text x="100" y="48" font-family="'JetBrains Mono', Consolas, monospace" font-size="10" fill="#ccd6f6">203.0.113.42</text>
      <text x="25" y="66" font-family="'JetBrains Mono', Consolas, monospace" font-size="10" fill="#8892b0">Request:   </text>
      <text x="100" y="66" font-family="'JetBrains Mono', Consolas, monospace" font-size="10" fill="#ff4444">GET /etc/passwd</text>
    </g>

    <!-- Alert 3: SQL Injection -->
    <g transform="translate(15, 245)">
      <rect width="510" height="80" rx="8" fill="rgba(255,68,68,0.05)" stroke="rgba(255,68,68,0.2)" stroke-width="0.5"/>
      <rect x="0" y="0" width="4" height="80" rx="2" fill="#ff4444"/>
      <circle cx="22" cy="22" r="8" fill="rgba(255,68,68,0.2)"/>
      <text x="22" y="26" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ff4444" text-anchor="middle">!</text>
      <text x="38" y="26" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#ff4444">SQL Injection</text>
