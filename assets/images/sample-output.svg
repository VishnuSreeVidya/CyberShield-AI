  <!-- Right: Detected Threats -->
  <g transform="translate(620, 30)">
    <rect width="540" height="340" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
