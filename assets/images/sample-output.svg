      <text x="192" y="26" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ff4444" text-anchor="middle">CRITICAL</text>
      <text x="25" y="48" font-family="'JetBrains Mono', Consolas, monospace" font-size="10" fill="#8892b0">Source IP: </text>
      <text x="100" y="48" font-family="'JetBrains Mono', Consolas, monospace" font-size="10" fill="#ccd6f6">10.0.0.88</text>
      <text x="25" y="66" font-family="'JetBrains Mono', Consolas, monospace" font-size="10" fill="#8892b0">Payload:   </text>
      <text x="100" y="66" font-family="'JetBrains Mono', Consolas, monospace" font-size="10" fill="#ff4444">' OR 1=1</text>
