      <text x="173" y="17" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#ffaa00" text-anchor="middle">HIGH</text>
      <text x="12" y="38" font-family="'JetBrains Mono', Consolas, monospace" font-size="9" fill="#8892b0">IP: 192.168.1.15 | 5 failed logins in 15s</text>
