<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550">
  <defs>
    <linearGradient id="outBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="135%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(34,38,74,0.55)"/>
      <stop offset="100%" style="stop-color:rgba(24,30,58,0.35)"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:0"/>
    </linearGradient>
    <filter id="termGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="550" fill="url(#outBg)"/>

  <!-- Title -->
  <text x="600" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600" fill="white" text-anchor="middle">Sample Analysis Outputs</text>
  <text x="600" y="48" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">Examples from Log Analysis and Intelligence Analysis Modules</text>

  <!-- ========== ROW 1: Log Analysis (left) + URL Analysis (right) ========== -->
