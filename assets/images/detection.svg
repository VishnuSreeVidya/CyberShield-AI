    <text x="82" y="105" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">UNION SELECT,</text>
    <text x="82" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">DROP TABLE</text>
    <rect x="30" y="140" width="105" height="24" rx="12" fill="rgba(170,0,255,0.12)"/>
    <text x="82" y="156" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#aa00ff" text-anchor="middle">Critical</text>
