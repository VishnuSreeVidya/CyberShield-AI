    <text x="82" y="156" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#00aaff" text-anchor="middle">Medium</text>
  </g>

  <g transform="translate(490, 290)">
    <rect width="165" height="180" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <circle cx="82" cy="45" r="22" fill="rgba(255,68,68,0.12)" stroke="#ff4444" stroke-width="1"/>
    <text x="82" y="51" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#ff4444" text-anchor="middle">&#x26A1;</text>
    <text x="82" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">DoS Attack</text>
    <text x="82" y="105" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">100+ requests</text>
    <text x="82" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">from same IP</text>
    <rect x="30" y="140" width="105" height="24" rx="12" fill="rgba(255,68,68,0.12)"/>
    <text x="82" y="156" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ff4444" text-anchor="middle">Critical</text>
  </g>

  <!-- Flow arrow -->
  <g transform="translate(680, 300)" opacity="0.4">
    <text x="82" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">Log Entry</text>
    <text x="82" y="105" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">Ingested</text>
    <text x="82" y="130" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#00ff88" text-anchor="middle">&#x25BC;</text>
    <text x="82" y="155" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">7 Rules</text>
    <text x="82" y="170" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">Applied</text>
    <text x="82" y="195" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#00ff88" text-anchor="middle">&#x25BC;</text>
    <text x="82" y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">Alert</text>
    <text x="82" y="235" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8892b0" text-anchor="middle">Generated</text>
