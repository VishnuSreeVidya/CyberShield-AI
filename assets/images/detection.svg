<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="detBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="glowGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="500" fill="url(#detBg)"/>

  <!-- Title -->
  <text x="600" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">Threat Detection Engine - 7 Detection Rules</text>
  <rect x="450" y="50" width="300" height="2" fill="url(#glowGreen)" rx="1"/>

  <!-- Detection Rule Cards -->
  <!-- Row 1 -->
  <g transform="translate(40, 80)">
    <rect width="165" height="180" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <circle cx="82" cy="45" r="22" fill="rgba(255,68,68,0.12)" stroke="#ff4444" stroke-width="1"/>
    <text x="82" y="51" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#ff4444" text-anchor="middle">&#x1F512;</text>
    <text x="82" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">Failed Login</text>
    <text x="82" y="105" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">Regex pattern</text>
    <text x="82" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">matching</text>
    <rect x="30" y="140" width="105" height="24" rx="12" fill="rgba(255,68,68,0.12)"/>
    <text x="82" y="156" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ff4444" text-anchor="middle">Critical</text>
  </g>

  <g transform="translate(220, 80)">
    <rect width="165" height="180" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <circle cx="82" cy="45" r="22" fill="rgba(255,170,0,0.12)" stroke="#ffaa00" stroke-width="1"/>
    <text x="82" y="51" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#ffaa00" text-anchor="middle">&#x26A0;</text>
    <text x="82" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">Brute Force</text>
    <text x="82" y="105" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">5+ failed logins</text>
    <text x="82" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">from same IP</text>
    <rect x="30" y="140" width="105" height="24" rx="12" fill="rgba(255,170,0,0.12)"/>
    <text x="82" y="156" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ffaa00" text-anchor="middle">High</text>
  </g>

  <g transform="translate(400, 80)">
