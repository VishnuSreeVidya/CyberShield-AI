    <circle cx="82" cy="45" r="22" fill="rgba(255,68,68,0.12)" stroke="#ff4444" stroke-width="1"/>
    <text x="82" y="51" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#ff4444" text-anchor="middle">&#x1F310;</text>
    <text x="82" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">XSS Attack</text>
    <text x="82" y="105" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">Script tags,</text>
    <text x="82" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">event handlers</text>
    <rect x="30" y="140" width="105" height="24" rx="12" fill="rgba(255,68,68,0.12)"/>
    <text x="82" y="156" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ff4444" text-anchor="middle">Critical</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(130, 290)">
    <rect width="165" height="180" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
