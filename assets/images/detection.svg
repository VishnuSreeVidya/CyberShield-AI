    <circle cx="82" cy="45" r="22" fill="rgba(170,0,255,0.12)" stroke="#aa00ff" stroke-width="1"/>
    <text x="82" y="51" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#aa00ff" text-anchor="middle">&#x1F4C9;</text>
