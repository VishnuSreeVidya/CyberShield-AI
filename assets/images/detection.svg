<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="detBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="glowGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="135%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(34,38,74,0.55)"/>
      <stop offset="100%" style="stop-color:rgba(24,30,58,0.35)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="url(#detBg)"/>

  <!-- Title -->
  <text x="600" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">Threat Detection Engine</text>
  <text x="600" y="58" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8892b0" text-anchor="middle">7 Log Rules + 5 Analysis Modules = 12 Detection Capabilities</text>
  <rect x="400" y="68" width="400" height="2" fill="url(#glowGreen)" rx="1"/>

  <!-- ========== SECTION: Log Detection Rules (7) ========== -->
  <text x="40" y="110" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#3b9eff">Log Detection Rules</text>
  <text x="40" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8892b0">Pattern matching on uploaded log files</text>

  <!-- Row 1: 4 rules -->
  <g transform="translate(40, 145)">
    <rect width="165" height="140" rx="10" fill="url(#glassGrad)" stroke="rgba(59,158,255,0.18)" stroke-width="0.5"/>
    <circle cx="82" cy="38" r="18" fill="rgba(255,68,68,0.12)" stroke="#ff4444" stroke-width="1"/>
    <text x="82" y="44" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#ff4444" text-anchor="middle">&#x1F512;</text>
    <text x="82" y="75" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">Failed Login</text>
    <text x="82" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Regex pattern</text>
    <text x="82" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">matching</text>
    <rect x="30" y="114" width="105" height="18" rx="9" fill="rgba(255,68,68,0.12)"/>
    <text x="82" y="127" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ff4444" text-anchor="middle">Critical</text>
  </g>

  <g transform="translate(220, 145)">
    <rect width="165" height="140" rx="10" fill="url(#glassGrad)" stroke="rgba(59,158,255,0.18)" stroke-width="0.5"/>
    <circle cx="82" cy="38" r="18" fill="rgba(255,170,0,0.12)" stroke="#ffaa00" stroke-width="1"/>
    <text x="82" y="44" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#ffaa00" text-anchor="middle">&#x26A0;</text>
    <text x="82" y="75" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">Brute Force</text>
    <text x="82" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">5+ failed logins</text>
    <text x="82" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">from same IP</text>
    <rect x="30" y="114" width="105" height="18" rx="9" fill="rgba(255,170,0,0.12)"/>
    <text x="82" y="127" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffaa00" text-anchor="middle">High</text>
  </g>

  <g transform="translate(400, 145)">
    <rect width="165" height="140" rx="10" fill="url(#glassGrad)" stroke="rgba(59,158,255,0.18)" stroke-width="0.5"/>
    <circle cx="82" cy="38" r="18" fill="rgba(170,0,255,0.12)" stroke="#aa00ff" stroke-width="1"/>
    <text x="82" y="44" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#aa00ff" text-anchor="middle">&#x1F4C9;</text>
    <text x="82" y="75" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">SQL Injection</text>
    <text x="82" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">UNION SELECT,</text>
    <text x="82" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">DROP TABLE</text>
    <rect x="30" y="114" width="105" height="18" rx="9" fill="rgba(170,0,255,0.12)"/>
    <text x="82" y="127" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#aa00ff" text-anchor="middle">Critical</text>
  </g>

  <g transform="translate(580, 145)">
    <rect width="165" height="140" rx="10" fill="url(#glassGrad)" stroke="rgba(59,158,255,0.18)" stroke-width="0.5"/>
    <circle cx="82" cy="38" r="18" fill="rgba(255,68,68,0.12)" stroke="#ff4444" stroke-width="1"/>
    <text x="82" y="44" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#ff4444" text-anchor="middle">&#x1F310;</text>
    <text x="82" y="75" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">XSS Attack</text>
    <text x="82" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Script tags,</text>
    <text x="82" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">event handlers</text>
    <rect x="30" y="114" width="105" height="18" rx="9" fill="rgba(255,68,68,0.12)"/>
    <text x="82" y="127" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ff4444" text-anchor="middle">Critical</text>
  </g>

  <!-- Row 2: 3 rules -->
  <g transform="translate(130, 300)">
    <rect width="165" height="140" rx="10" fill="url(#glassGrad)" stroke="rgba(59,158,255,0.18)" stroke-width="0.5"/>
    <circle cx="82" cy="38" r="18" fill="rgba(255,170,0,0.12)" stroke="#ffaa00" stroke-width="1"/>
    <text x="82" y="44" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#ffaa00" text-anchor="middle">&#x1F4C1;</text>
    <text x="82" y="75" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">Dir. Traversal</text>
    <text x="82" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">../, %2e%2e</text>
    <text x="82" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">encoded variants</text>
    <rect x="30" y="114" width="105" height="18" rx="9" fill="rgba(255,170,0,0.12)"/>
    <text x="82" y="127" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffaa00" text-anchor="middle">High</text>
  </g>

  <g transform="translate(310, 300)">
    <rect width="165" height="140" rx="10" fill="url(#glassGrad)" stroke="rgba(59,158,255,0.18)" stroke-width="0.5"/>
    <circle cx="82" cy="38" r="18" fill="rgba(0,170,255,0.12)" stroke="#00aaff" stroke-width="1"/>
    <text x="82" y="44" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#00aaff" text-anchor="middle">&#x1F310;</text>
    <text x="82" y="75" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">Port Scanning</text>
    <text x="82" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">15+ unique</text>
    <text x="82" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">endpoints from IP</text>
    <rect x="30" y="114" width="105" height="18" rx="9" fill="rgba(0,170,255,0.12)"/>
    <text x="82" y="127" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#00aaff" text-anchor="middle">Medium</text>
  </g>

  <g transform="translate(490, 300)">
    <rect width="165" height="140" rx="10" fill="url(#glassGrad)" stroke="rgba(59,158,255,0.18)" stroke-width="0.5"/>
    <circle cx="82" cy="38" r="18" fill="rgba(255,68,68,0.12)" stroke="#ff4444" stroke-width="1"/>
    <text x="82" y="44" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#ff4444" text-anchor="middle">&#x26A1;</text>
    <text x="82" y="75" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">DoS Attack</text>
    <text x="82" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">100+ requests</text>
    <text x="82" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">from same IP</text>
    <rect x="30" y="114" width="105" height="18" rx="9" fill="rgba(255,68,68,0.12)"/>
    <text x="82" y="127" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ff4444" text-anchor="middle">Critical</text>
  </g>

  <!-- Flow indicator between sections -->
  <g transform="translate(680, 310)">
    <text x="82" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">Log Entry</text>
    <text x="82" y="75" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">Ingested</text>
    <text x="82" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#00ff88" text-anchor="middle">&#x25BC;</text>
    <text x="82" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">7 Rules</text>
    <text x="82" y="135" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">Applied</text>
    <text x="82" y="155" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#00ff88" text-anchor="middle">&#x25BC;</text>
    <text x="82" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">Alert</text>
    <text x="82" y="190" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">Generated</text>
  </g>

  <!-- ========== SECTION: Intelligence Analysis Modules (5) ========== -->
  <text x="40" y="490" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#3b9eff">Intelligence Analysis Modules</text>
  <text x="40" y="508" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8892b0">Multi-source threat analysis for URLs, text, documents, IPs, and hashes</text>

  <!-- Analysis Module Cards -->
  <g transform="translate(40, 525)">
    <!-- URL Analysis -->
    <g transform="translate(0, 0)">
      <rect width="200" height="150" rx="10" fill="url(#glassGrad)" stroke="rgba(59,158,255,0.18)" stroke-width="0.5"/>
      <rect x="0" y="0" width="200" height="4" rx="2" fill="#3b9eff" opacity="0.6"/>
      <circle cx="100" cy="45" r="20" fill="rgba(59,158,255,0.12)" stroke="#3b9eff" stroke-width="1"/>
      <circle cx="100" cy="45" r="8" fill="none" stroke="#3b9eff" stroke-width="1.5"/>
      <line x1="100" y1="53" x2="100" y2="65" stroke="#3b9eff" stroke-width="1.5"/>
      <text x="100" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">URL Analysis</text>
      <text x="100" y="102" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Phishing detection,</text>
      <text x="100" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">malware URLs,</text>
      <text x="100" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">domain reputation</text>
      <rect x="50" y="132" width="100" height="14" rx="7" fill="rgba(59,158,255,0.12)"/>
      <text x="100" y="142" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#3b9eff" text-anchor="middle">Active</text>
    </g>

    <!-- Text Analysis -->
    <g transform="translate(216, 0)">
      <rect width="200" height="150" rx="10" fill="url(#glassGrad)" stroke="rgba(59,158,255,0.18)" stroke-width="0.5"/>
      <rect x="0" y="0" width="200" height="4" rx="2" fill="#f59e0b" opacity="0.6"/>
      <circle cx="100" cy="45" r="20" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1"/>
      <rect x="88" y="33" width="24" height="28" rx="3" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
      <line x1="92" y1="40" x2="108" y2="40" stroke="#f59e0b" stroke-width="1"/>
      <line x1="92" y1="46" x2="104" y2="46" stroke="#f59e0b" stroke-width="1"/>
      <line x1="92" y1="52" x2="106" y2="52" stroke="#f59e0b" stroke-width="1"/>
      <text x="100" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">Text Analysis</text>
      <text x="100" y="102" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Credential leaks,</text>
      <text x="100" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">PII detection,</text>
      <text x="100" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">threat keywords</text>
      <rect x="50" y="132" width="100" height="14" rx="7" fill="rgba(245,158,11,0.12)"/>
      <text x="100" y="142" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">Active</text>
    </g>

    <!-- PDF Analysis -->
    <g transform="translate(432, 0)">
      <rect width="200" height="150" rx="10" fill="url(#glassGrad)" stroke="rgba(59,158,255,0.18)" stroke-width="0.5"/>
      <rect x="0" y="0" width="200" height="4" rx="2" fill="#ef4444" opacity="0.6"/>
      <circle cx="100" cy="45" r="20" fill="rgba(239,68,68,0.12)" stroke="#ef4444" stroke-width="1"/>
      <rect x="88" y="32" width="24" height="30" rx="3" fill="none" stroke="#ef4444" stroke-width="1.5"/>
      <text x="100" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle" font-weight="600">PDF</text>
      <text x="100" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">PDF Analysis</text>
      <text x="100" y="102" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Malicious scripts,</text>
      <text x="100" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">embedded exploits,</text>
      <text x="100" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">obfuscation</text>
      <rect x="50" y="132" width="100" height="14" rx="7" fill="rgba(239,68,68,0.12)"/>
      <text x="100" y="142" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">Active</text>
    </g>

    <!-- IP Analysis -->
    <g transform="translate(648, 0)">
      <rect width="200" height="150" rx="10" fill="url(#glassGrad)" stroke="rgba(59,158,255,0.18)" stroke-width="0.5"/>
      <rect x="0" y="0" width="200" height="4" rx="2" fill="#22c55e" opacity="0.6"/>
      <circle cx="100" cy="45" r="20" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1"/>
      <circle cx="100" cy="45" r="10" fill="none" stroke="#22c55e" stroke-width="1.5"/>
      <ellipse cx="100" cy="45" rx="5" ry="10" fill="none" stroke="#22c55e" stroke-width="1"/>
      <line x1="90" y1="45" x2="110" y2="45" stroke="#22c55e" stroke-width="1"/>
      <text x="100" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">IP Analysis</text>
      <text x="100" y="102" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">Geolocation,</text>
      <text x="100" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">blacklist check,</text>
      <text x="100" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">ASN lookup</text>
      <rect x="50" y="132" width="100" height="14" rx="7" fill="rgba(34,197,94,0.12)"/>
      <text x="100" y="142" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#22c55e" text-anchor="middle">Active</text>
    </g>

    <!-- Hash Analysis -->
    <g transform="translate(864, 0)">
      <rect width="200" height="150" rx="10" fill="url(#glassGrad)" stroke="rgba(59,158,255,0.18)" stroke-width="0.5"/>
      <rect x="0" y="0" width="200" height="4" rx="2" fill="#aa00ff" opacity="0.6"/>
      <circle cx="100" cy="45" r="20" fill="rgba(170,0,255,0.12)" stroke="#aa00ff" stroke-width="1"/>
      <text x="100" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#aa00ff" text-anchor="middle" font-weight="700">#</text>
      <text x="100" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">Hash Analysis</text>
      <text x="100" y="102" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">VirusTotal lookup,</text>
      <text x="100" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">malware hash DB,</text>
      <text x="100" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle">file verification</text>
