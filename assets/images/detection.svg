    <circle cx="82" cy="45" r="22" fill="rgba(0,170,255,0.12)" stroke="#00aaff" stroke-width="1"/>
    <text x="82" y="51" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#00aaff" text-anchor="middle">&#x1F310;</text>
    <text x="82" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">Port Scanning</text>
    <text x="82" y="105" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">15+ unique</text>
    <text x="82" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">endpoints from IP</text>
