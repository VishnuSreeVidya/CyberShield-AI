<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1f4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc6a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#00aaff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#aa00ff;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <g opacity="0.05" stroke="#00ff88" stroke-width="0.5">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Floating particles -->
  <circle cx="150" cy="80" r="2" fill="#00ff88" opacity="0.4" filter="url(#glow)">
    <animate attributeName="cy" values="80;60;80" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="320" r="1.5" fill="#00aaff" opacity="0.3" filter="url(#glow)">
    <animate attributeName="cy" values="320;340;320" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="120" r="2.5" fill="#aa00ff" opacity="0.3" filter="url(#glow)">
    <animate attributeName="cy" values="120;100;120" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="280" r="1.8" fill="#00ff88" opacity="0.4" filter="url(#glow)">
    <animate attributeName="cy" values="280;300;280" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="950" cy="60" r="2" fill="#00aaff" opacity="0.35" filter="url(#glow)">
    <animate attributeName="cy" values="60;80;60" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="200" r="1.5" fill="#aa00ff" opacity="0.3" filter="url(#glow)">
    <animate attributeName="cy" values="200;180;200" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Shield icon -->
  <g transform="translate(140, 100)" filter="url(#softGlow)">
    <path d="M60 10 L110 35 L110 80 C110 115 85 140 60 155 C35 140 10 115 10 80 L10 35 Z"
          fill="none" stroke="url(#shieldGrad)" stroke-width="3" opacity="0.9"/>
    <path d="M60 25 L100 45 L100 78 C100 107 80 128 60 140 C40 128 20 107 20 78 L20 45 Z"
          fill="url(#shieldGrad)" opacity="0.15"/>
    <!-- Checkmark -->
    <path d="M40 75 L55 90 L82 55" fill="none" stroke="url(#shieldGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title text -->
  <text x="320" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="56" font-weight="700" fill="white" filter="url(#glow)">
    CyberShield AI
  </text>

  <!-- Subtitle -->
  <text x="320" y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#8892b0" letter-spacing="2">
    REAL-TIME CYBERSECURITY LOG ANALYZER
  </text>

  <!-- Accent line -->
  <rect x="320" y="235" width="200" height="2" fill="url(#neonGrad)" rx="1"/>

  <!-- Feature badges -->
  <g transform="translate(320, 260)">
    <rect x="0" y="0" width="120" height="28" rx="14" fill="#00ff88" opacity="0.12" stroke="#00ff88" stroke-width="0.5"/>
    <text x="60" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#00ff88" text-anchor="middle">THREAT DETECTION</text>

    <rect x="135" y="0" width="100" height="28" rx="14" fill="#00aaff" opacity="0.12" stroke="#00aaff" stroke-width="0.5"/>
    <text x="185" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#00aaff" text-anchor="middle">LOG ANALYSIS</text>

    <rect x="250" y="0" width="100" height="28" rx="14" fill="#aa00ff" opacity="0.12" stroke="#aa00ff" stroke-width="0.5"/>
    <text x="300" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#aa00ff" text-anchor="middle">SOC DASHBOARD</text>

    <rect x="365" y="0" width="90" height="28" rx="14" fill="#ff6b35" opacity="0.12" stroke="#ff6b35" stroke-width="0.5"/>
    <text x="410" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#ff6b35" text-anchor="middle">REPORTS</text>
  </g>

  <!-- Right side decorative elements - mini chart -->
  <g transform="translate(850, 100)" opacity="0.6">
    <!-- Bar chart -->
    <rect x="0" y="60" width="20" height="40" rx="3" fill="#00ff88" opacity="0.7">
      <animate attributeName="height" values="40;55;40" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="60;45;60" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="30" y="30" width="20" height="70" rx="3" fill="#00aaff" opacity="0.7">
      <animate attributeName="height" values="70;50;70" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="30;50;30" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="60" y="45" width="20" height="55" rx="3" fill="#aa00ff" opacity="0.7">
      <animate attributeName="height" values="55;70;55" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="45;30;45" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="90" y="20" width="20" height="80" rx="3" fill="#ff6b35" opacity="0.7">
      <animate attributeName="height" values="80;60;80" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="20;40;20" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="120" y="35" width="20" height="65" rx="3" fill="#00ff88" opacity="0.7">
      <animate attributeName="height" values="65;45;65" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="35;55;35" dur="2.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="150" y="10" width="20" height="90" rx="3" fill="#00aaff" opacity="0.7">
      <animate attributeName="height" values="90;70;90" dur="2.1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="10;30;10" dur="2.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Alert icon -->
  <g transform="translate(880, 240)" filter="url(#glow)">
    <circle cx="20" cy="20" r="18" fill="none" stroke="#ff4444" stroke-width="1.5" opacity="0.5"/>
    <text x="20" y="26" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#ff4444" text-anchor="middle">!</text>
    <text x="50" y="25" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ff4444" opacity="0.7">ALERT</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="395" width="1200" height="5" fill="url(#neonGrad)" opacity="0.8"/>
</svg>